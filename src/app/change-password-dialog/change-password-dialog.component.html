<div class="dialog-header">
  <h2 class="dialog-title">Change Password</h2>
  <button class="close-btn" type="button" (click)="cancel()">
    <mat-icon>close</mat-icon>
  </button>
</div>

<mat-dialog-content>
  <form [formGroup]="passwordForm" class="dialog-form">

    <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field-full">
      <mat-label>Current Password</mat-label>
      <input matInput type="password" formControlName="currentPassword" />
    </mat-form-field>

    <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field-full">
      <mat-label>New Password</mat-label>
      <input matInput type="password" formControlName="newPassword" />
    </mat-form-field>

    <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field-full">
      <mat-label>Confirm Password</mat-label>
      <input matInput type="password" formControlName="confirmPassword" />
      <mat-error *ngIf="passwordForm.get('confirmPassword')?.hasError('mismatch')">
        Passwords do not match
      </mat-error>
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions class="dialog-actions">
  <button class="btn-cancel" type="button" (click)="cancel()">Cancel</button>
  <button class="btn-confirm" type="button" (click)="changePassword()" [disabled]="passwordForm.invalid">
    Change Password
  </button>
</mat-dialog-actions>
