<div class="dialog-header">
  <h2 class="dialog-title">New Exercise</h2>
  <button class="dialog-close-btn" type="button" (click)="onCancel()" matTooltip="Close">
    <mat-icon>close</mat-icon>
  </button>
</div>

<mat-dialog-content>
  <form [formGroup]="exerciseForm" (ngSubmit)="onSubmit()" class="dialog-form">

    <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field-full">
      <mat-label>Exercise Name</mat-label>
      <input matInput formControlName="name" placeholder="e.g. Incline Bench Press" />
    </mat-form-field>

    <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field-full">
      <mat-label>Category</mat-label>
      <mat-select formControlName="category">
        <mat-option *ngFor="let cat of categories" [value]="cat">{{ cat }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field-full">
      <mat-label>Muscle Groups</mat-label>
      <input matInput formControlName="muscleGroups" placeholder="e.g. Chest, Triceps" />
    </mat-form-field>

    <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field-full">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="3"></textarea>
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions class="dialog-actions">
  <button class="btn-primary" type="button" (click)="onSubmit()" [disabled]="exerciseForm.invalid">
    <mat-icon>check</mat-icon>
    Save Exercise
  </button>
  <button class="btn-cancel" type="button" (click)="onCancel()">Cancel</button>
</mat-dialog-actions>
