<div class="form-page">
  <form [formGroup]="workoutForm" (ngSubmit)="onSubmit()" class="form-layout">

    <!-- ── Page header ── -->
    <div class="page-header">
      <div class="page-title-block">
        <span class="page-eyebrow">Workout</span>
        <h1 class="page-title">{{ submitLabel }}</h1>
      </div>
      <mat-form-field appearance="outline" subscriptSizing="dynamic" class="template-picker" floatLabel="always">
        <mat-select placeholder="Load Template" (selectionChange)="onChooseTemplate($event.value)" formControlName="template">
          <mat-option *ngFor="let temp of allTemplates" [value]="temp.templateId">{{ temp.name }}</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <!-- ── Workout info section ── -->
    <section class="form-section">
      <div class="section-header">
        <span class="section-label">Workout Info</span>
      </div>

      <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field-full">
        <mat-label>Workout Name</mat-label>
        <input matInput formControlName="name" placeholder="e.g. Push Day, Leg Day…" />
      </mat-form-field>

      <div class="row-thirds">
        <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field-full">
          <mat-label>Date</mat-label>
          <input matInput [matDatepicker]="picker" formControlName="dateOnly" />
          <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field-full">
          <mat-label>Start Time</mat-label>
          <input matInput [matTimepicker]="timepicker" formControlName="timeOnly">
          <mat-timepicker #timepicker/>
          <mat-timepicker-toggle [for]="timepicker" matSuffix/>
        </mat-form-field>

        <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field-full">
          <mat-label>Duration (min)</mat-label>
          <input matInput type="number" formControlName="duration" />
        </mat-form-field>
      </div>

      <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field-full">
        <mat-label>Notes</mat-label>
        <textarea matInput formControlName="notes" rows="3" placeholder="How did it go? Any PRs?"></textarea>
      </mat-form-field>
    </section>

    <!-- ── Exercises section ── -->
    <section class="form-section">
      <div class="section-header exercises-header">
        <span class="section-label">Exercises</span>
        <button class="btn-ghost-sm" type="button" (click)="onCreateExercise()">
          <mat-icon>add_circle_outline</mat-icon>
          New Exercise
        </button>
      </div>

      <div formArrayName="workoutExercises">
        <div
          *ngFor="let ex of exercises.controls; let i = index"
          [formGroupName]="i"
          class="exercise-card">

          <div class="exercise-card-header">
            <div class="exercise-number">{{ i + 1 }}</div>
            <span class="exercise-card-title">Exercise {{ i + 1 }}</span>
            <button class="btn-icon-danger" type="button" (click)="removeExercise(i)" matTooltip="Remove">
              <mat-icon>delete_outline</mat-icon>
            </button>
          </div>

          <div class="row-halves">
            <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field-full">
              <mat-label>Category</mat-label>
              <mat-select (selectionChange)="onCategoryChange(i)" formControlName="category">
                <mat-option *ngFor="let cat of exerciseCategories" [value]="cat">{{ cat }}</mat-option>
              </mat-select>
            </mat-form-field>

            <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field-full">
              <mat-label>Exercise</mat-label>
              <mat-select (selectionChange)="onExerciseChange(i)" formControlName="exerciseId">
                <mat-option *ngFor="let ex of filteredExercises[i]" [value]="ex.exerciseId">
                  {{ ex.name }}
                </mat-option>
              </mat-select>
            </mat-form-field>
          </div>

          <ng-container *ngIf="exercises.at(i).get('category')?.value === 'Strength'">
            <div class="row-thirds">
              <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field-full">
                <mat-label>Sets</mat-label>
                <input matInput type="number" formControlName="sets" />
              </mat-form-field>
              <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field-full">
                <mat-label>Reps</mat-label>
                <input matInput type="number" formControlName="reps" />
              </mat-form-field>
              <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field-full">
                <mat-label>Weight (kg)</mat-label>
                <input matInput type="number" formControlName="weight" />
              </mat-form-field>
            </div>
          </ng-container>

          <ng-container *ngIf="exercises.at(i).get('category')?.value === 'Cardio'">
            <div class="row-halves">
              <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field-full">
                <mat-label>Distance (km)</mat-label>
                <input matInput type="number" formControlName="distance" />
              </mat-form-field>
              <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field-full">
                <mat-label>Duration (min)</mat-label>
                <input matInput type="number" formControlName="duration" />
              </mat-form-field>
            </div>
          </ng-container>

          <ng-container *ngIf="exercises.at(i).get('category')?.value === 'Static'">
            <div class="row-halves">
              <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field-full">
                <mat-label>Duration (min)</mat-label>
                <input matInput type="number" formControlName="duration" />
              </mat-form-field>
              <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field-full">
                <mat-label>Sets</mat-label>
                <input matInput type="number" formControlName="sets" />
              </mat-form-field>
            </div>
          </ng-container>

        </div>
      </div>

      <button class="btn-add-exercise" type="button" (click)="addExercise()">
        <mat-icon>add</mat-icon>
        Add Exercise
      </button>
    </section>

    <!-- ── Actions ── -->
    <div class="form-actions">
      <button class="btn-primary" type="submit" [disabled]="workoutForm.invalid">
        <mat-icon>check</mat-icon>
        {{ submitLabel }}
      </button>
      <button class="btn-outline" type="button" (click)="onSaveTemplate()">
        <mat-icon>bookmark_border</mat-icon>
        Save as Template
      </button>
      <button class="btn-cancel" type="button" (click)="onCancel()">
        Cancel
      </button>
    </div>

  </form>

</div>
