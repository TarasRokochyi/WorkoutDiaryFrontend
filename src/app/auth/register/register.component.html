<form [formGroup]="registerForm" (ngSubmit)="onSubmit()" novalidate class="auth-form">

  <div class="row-halves">
    <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field-full">
      <mat-label>First Name</mat-label>
      <input matInput formControlName="firstName" />
    </mat-form-field>

    <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field-full">
      <mat-label>Last Name</mat-label>
      <input matInput formControlName="lastName" />
    </mat-form-field>
  </div>

  <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field-full">
    <mat-label>Username</mat-label>
    <input matInput formControlName="username" />
  </mat-form-field>

  <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field-full">
    <mat-label>Email</mat-label>
    <input matInput formControlName="email" type="email" />
    <mat-error *ngIf="validateControl('email') && hasError('email', 'required')">Email is required</mat-error>
    <mat-error *ngIf="validateControl('email') && hasError('email', 'email')">Invalid email</mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field-full">
    <mat-label>Password</mat-label>
    <input matInput formControlName="password" type="password" />
    <mat-error *ngIf="validateControl('password') && hasError('password', 'required')">Password is required</mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field-full">
    <mat-label>Confirm Password</mat-label>
    <input matInput formControlName="confirmPassword" type="password" />
    <mat-error *ngIf="validateControl('confirmPassword') && hasError('confirmPassword', 'required')">Password is required</mat-error>
    <mat-error *ngIf="validateControl('confirmPassword') && hasError('confirmPassword', 'mismatch')">Passwords do not match</mat-error>
  </mat-form-field>

  <button class="btn-submit" type="submit" [disabled]="!registerForm.valid">
    Create Account
  </button>

</form>
