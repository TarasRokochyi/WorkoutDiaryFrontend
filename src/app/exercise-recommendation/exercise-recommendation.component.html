<div class="page">

  <div class="page-header">
    <h1 class="page-title">Exercise Recommendation</h1>
  </div>

  <!-- Mode toggle -->
  <div class="mode-card">
    <button class="mode-btn" [class.active]="mode === 'upload'" (click)="setMode('upload')">
      <mat-icon>add_photo_alternate</mat-icon>
      Upload Photo
    </button>
    <div class="mode-divider"></div>
    <button class="mode-btn" [class.active]="mode === 'manual'" (click)="setMode('manual')">
      <mat-icon>fitness_center</mat-icon>
      Select Equipment
    </button>
  </div>

  <!-- Upload mode -->
  <div class="upload-card" *ngIf="mode === 'upload'">
    <div class="drop-area" (drop)="onDrop($event)" (dragover)="onDragOver($event)">
      <input id="file" type="file" accept="image/*" (change)="onFileSelected($event)" />
      <label for="file" class="drop-label">
        <ng-container *ngIf="!previewSrc">
          <mat-icon class="drop-icon">add_photo_alternate</mat-icon>
          <span class="drop-text">Drag & drop equipment photo here</span>
          <span class="drop-subtext">or click to browse</span>
        </ng-container>
        <img *ngIf="previewSrc" [src]="previewSrc" alt="preview" class="preview" />
      </label>
    </div>
    <div class="upload-actions">
      <button class="btn-primary" (click)="upload()" [disabled]="!selectedFile || loading">
        <mat-icon>{{ loading ? 'hourglass_empty' : 'search' }}</mat-icon>
        {{ loading ? 'Analysing…' : 'Upload & Analyse' }}
      </button>
    </div>
    <div class="error-msg" *ngIf="error">{{ error }}</div>
  </div>

  <!-- Manual mode -->
  <div class="upload-card" *ngIf="mode === 'manual'">
    <div class="section-header">
      <span class="section-label">Available Equipment</span>
    </div>

    <div class="equipment-grid" *ngIf="allEquipmentNames.length; else loadingEquipment">
      <button
        class="equipment-chip"
        *ngFor="let name of allEquipmentNames"
        [class.selected]="isEquipmentSelected(name)"
        (click)="toggleEquipment(name)">
        <mat-icon *ngIf="isEquipmentSelected(name)">check</mat-icon>
        {{ name }}
      </button>
    </div>

    <ng-template #loadingEquipment>
      <p class="muted">Loading equipment list…</p>
    </ng-template>

    <div class="upload-actions">
      <button class="btn-primary" (click)="getManualRecommendations()" [disabled]="!selectedEquipmentNames.length || loading">
        <mat-icon>{{ loading ? 'hourglass_empty' : 'bolt' }}</mat-icon>
        {{ loading ? 'Loading…' : 'Get Recommendations' }}
      </button>
    </div>
    <div class="error-msg" *ngIf="error">{{ error }}</div>
  </div>

  <!-- Results -->
  <ng-container *ngIf="recommendations.length > 0 && !loading">

    <div class="results-card">
      <div class="section-header">
        <span class="section-label">Detected Equipment</span>
      </div>
      <div class="tags">
        <span class="tag" *ngFor="let eq of equipments">{{ eq }}</span>
      </div>
    </div>

    <div class="results-card">
      <div class="section-header exercises-header">
        <span class="section-label">Suggested Exercises</span>
        <div class="bulk-actions">
          <label class="select-all-label">
            <input type="checkbox" [(ngModel)]="selectAllChecked" (change)="toggleSelectAll()" />
            <span>Select all</span>
          </label>
          <button class="btn-primary btn-sm" (click)="addSelectedExercises()" [disabled]="selectedExercises.length === 0">
            Add Selected ({{ selectedExercises.length }})
          </button>
        </div>
      </div>

      <div class="exercise-list">
        <div class="exercise-card" *ngFor="let s of recommendations">
          <div class="exercise-left">
            <input type="checkbox" class="select-box" [checked]="isSelected(s)" (change)="toggleExerciseSelection(s)" />
            <div class="exercise-info">
              <span class="exercise-name">{{ s.exercise.name }}</span>
              <span class="equipment-name">{{ s.equipmentName }}</span>
            </div>
          </div>
          <button class="btn-outline btn-sm" (click)="addExerciseToWorkout(s)">Add</button>
        </div>
      </div>
    </div>

  </ng-container>

</div>
